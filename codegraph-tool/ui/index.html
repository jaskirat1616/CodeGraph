<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodeGraph UI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>CodeGraph</h1>
        <div class="toolbar">
            <input type="text" id="search" placeholder="Search nodes..." />
            <span id="stats"></span>
            <a id="viewToggle" href="#">Full view</a>
            <button type="button" id="clearHighlight" class="btn-clear" title="Clear graph highlight" style="display:none;">Clear highlight</button>
            <a id="chatToggle" href="#" class="btn-chat" title="Chat with Ollama">Chat</a>
            <button id="themeToggle" type="button" class="btn-theme" title="Toggle light/dark mode" aria-label="Toggle theme"></button>
        </div>
    </header>
    <aside class="legend">
        <strong>Node types</strong>
        <div class="legend-item"><span class="dot neon-repo"></span> Repository</div>
        <div class="legend-item"><span class="dot neon-file"></span> File</div>
        <div class="legend-item"><span class="dot neon-class"></span> Class</div>
        <div class="legend-item"><span class="dot neon-func"></span> Function</div>
        <div class="legend-item"><span class="dot neon-method"></span> Method</div>
        <div class="legend-item"><span class="dot neon-module"></span> Module</div>
        <p class="hint">Click a node to expand and view code</p>
    </aside>
    <aside class="details-panel" id="detailsPanel">
        <h3>Node details</h3>
        <div id="detailsContent"></div>
    </aside>
    <div id="graph3d" class="graph3d-container"></div>
    <aside class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <h3>Ask about your code</h3>
            <label class="chat-model-label" for="chatModel">Model (choose any Ollama model)</label>
            <div class="chat-model-row">
                <select id="chatModel" class="chat-model-select" title="Select an Ollama model">
                    <option value="">Loading…</option>
                </select>
                <button type="button" id="chatRefreshModels" class="btn-refresh" title="Refresh model list">↻</button>
            </div>
            <span id="chatStatus" class="chat-status"></span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-wrap">
            <input type="text" id="chatInput" placeholder="e.g. Which functions call the database?" autocomplete="off">
            <button type="button" id="chatSend" class="chat-send">Send</button>
        </div>
    </aside>
    <script src="theme.js"></script>
    <script src="graph3d.js"></script>
    <script src="chat.js"></script>
</body>
</html>
